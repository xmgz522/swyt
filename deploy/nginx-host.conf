# ===== 宿主机 Nginx 配置（域名绑定用） =====
# 放到服务器的 /etc/nginx/conf.d/ 目录下
# 如果不用域名，直接通过 IP:8080（后台）和 IP:8081（学生端）访问即可

# 后台管理
server {
    listen 80;
    server_name admin.yourdomain.com;  # 改为你的域名

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SSL 配置（有证书时取消注释）
    # listen 443 ssl;
    # ssl_certificate /etc/nginx/ssl/admin.crt;
    # ssl_certificate_key /etc/nginx/ssl/admin.key;
}

# 学生PC端
server {
    listen 80;
    server_name www.yourdomain.com;  # 改为你的域名

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# 后端 API（小程序直连用）
server {
    listen 80;
    server_name api.yourdomain.com;  # 改为你的域名

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
