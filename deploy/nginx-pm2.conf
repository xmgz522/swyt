# ===== 非 Docker 方案的 Nginx 配置 =====
# 适用于宝塔面板或手动安装 Nginx 的服务器
# 将此文件放到 /etc/nginx/conf.d/ 目录下

# 后台管理（静态文件 + API 反代）
server {
    listen 8080;
    # server_name admin.yourdomain.com;  # 有域名时取消注释

    root /opt/zj-early-admission/admin/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# 学生PC端（静态文件 + API 反代）
server {
    listen 8081;
    # server_name www.yourdomain.com;  # 有域名时取消注释

    root /opt/zj-early-admission/student-web/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# 后端 API（小程序直连）
server {
    listen 80;
    server_name api.yourdomain.com;  # 改为你的域名

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SSL（微信小程序要求 HTTPS）
    # listen 443 ssl;
    # ssl_certificate /etc/nginx/ssl/api.crt;
    # ssl_certificate_key /etc/nginx/ssl/api.key;
}
